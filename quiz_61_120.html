<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập Embedded Systems – Câu 61–120</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a1a2e; padding: 20px; }
  h1 { text-align: center; margin-bottom: 6px; font-size: 1.6rem; color: #0f3460; }
  .subtitle { text-align: center; color: #555; margin-bottom: 16px; font-size: 0.95rem; }
 
  .toolbar {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 10px; margin-bottom: 20px;
  }
  .toggle-btn {
    padding: 8px 20px; border: 2px solid #e94560; border-radius: 20px;
    background: #fff; color: #e94560; font-weight: 600; font-size: 0.88rem;
    cursor: pointer; transition: all 0.2s;
  }
  .toggle-btn.active { background: #e94560; color: #fff; }
  .toggle-btn:hover { opacity: 0.85; }
 
  .quiz-card {
    background: #fff; border-radius: 10px; padding: 18px 22px;
    margin-bottom: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    border-left: 4px solid #e94560;
  }
  .question-text { font-weight: 600; margin-bottom: 12px; line-height: 1.5; font-size: 0.97rem; }
  .options label {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 12px; border-radius: 6px; cursor: pointer;
    margin-bottom: 6px; border: 1.5px solid #e0e0e0;
    background: #fafafa; transition: background 0.15s;
    font-size: 0.93rem; line-height: 1.4;
  }
  .options label:hover { background: #fde8ec; border-color: #e94560; }
  .options input[type=radio] { margin-top: 3px; flex-shrink: 0; }
  .result-correct { background: #d4edda !important; border-color: #28a745 !important; }
  .result-wrong   { background: #f8d7da !important; border-color: #dc3545 !important; }
  .result-answer  { background: #fff3cd !important; border-color: #ffc107 !important; }
 
  .btn-row { display: flex; justify-content: center; gap: 16px; margin: 28px 0 10px; flex-wrap: wrap; }
  button {
    padding: 12px 36px; border: none; border-radius: 8px;
    font-size: 1rem; cursor: pointer; font-weight: 600; transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  #btn-submit  { background: #0f3460; color: #fff; }
  #btn-reset   { background: #28a745; color: #fff; }
  #btn-shuffle { background: #e94560; color: #fff; }
 
  #score-box {
    display: none; text-align: center; font-size: 1.3rem; font-weight: 700;
    padding: 16px; background: #0f3460; color: #fff;
    border-radius: 10px; margin-bottom: 20px;
  }
  .legend {
    display: flex; gap: 18px; justify-content: center;
    margin-bottom: 20px; font-size: 0.85rem; flex-wrap: wrap;
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
  a.nav-link {
    display: block; text-align: center; margin-top: 10px;
    color: #e94560; font-weight: 600; text-decoration: none; font-size: 0.95rem;
  }
  a.nav-link:hover { text-decoration: underline; }
</style>
</head>
<body>
 
<h1>📚 Ôn Tập Embedded Systems</h1>
<p class="subtitle">Câu 61 – 120 &nbsp;|&nbsp; Chọn đáp án rồi bấm <b>Nộp bài</b></p>
 
<div class="toolbar">
  <button class="toggle-btn active" id="tog-q" onclick="toggleShuffleQ()">🔀 Tráo câu hỏi: BẬT</button>
  <button class="toggle-btn active" id="tog-a" onclick="toggleShuffleA()">🔀 Tráo đáp án: BẬT</button>
</div>
 
<div id="score-box"></div>
 
<div class="legend">
  <span><span class="dot" style="background:#28a745"></span> Đúng</span>
  <span><span class="dot" style="background:#dc3545"></span> Sai (bạn chọn)</span>
  <span><span class="dot" style="background:#ffc107"></span> Đáp án đúng</span>
</div>
 
<div id="quiz-container"></div>
 
<div class="btn-row">
  <button id="btn-submit" onclick="submitQuiz()">✅ Nộp bài</button>
  <button id="btn-shuffle" onclick="shuffleAndRebuild()">🔀 Tráo đề mới</button>
  <button id="btn-reset"  onclick="resetQuiz()">🔄 Làm lại</button>
</div>
 
<a class="nav-link" href="quiz_1_60.html">⬅️ Quay lại: Câu 1–60</a>
 
<script>
const BANK = [
  { q:"61. Which of the following embedded system software converts each line of assembly-based code to machine-based code at a time?", opts:["Compiler","Assembler","Debugger","All"], ans:1 },
  { q:"62. Which of the following ES software are the examples of Assembler software?", opts:["C","C++","GNU","Java"], ans:2 },
  { q:"63. Which of the following ES software are the examples of compiler software?", opts:["C","C++","All","Java"], ans:2 },
  { q:"64. Which of the following hardware is used as alternative for an embedded system?", opts:["ICE (In-Circuit Emulator)","Emulator","Memory","Counters"], ans:0 },
  { q:"65. Which of the following devices is volatile memory?", opts:["Flash drives","Computer BIOS","Motherboard","All"], ans:2 },
  { q:"66. Which of the following IC are microprocessors?", opts:["MC6800","8085","8086","All"], ans:3 },
  { q:"67. Which of the following IC are microcontrollers?", opts:["MC6800 and 8051","8051 and ATmega328","ATmega328 and 8086","8086 and MC6800"], ans:1 },
  { q:"68. 8086 type processor is designed with how many bits?", opts:["4 bit","8 bit","16 bit","32 bit"], ans:2 },
  { q:"69. Embedded software has the following components?", opts:["Program/script","OS","Firmware","All"], ans:3 },
  { q:"70. Which architecture in DSP reduces the execution time?", opts:["Harvard","CISC","Von Neumann","Program storage"], ans:0 },
  { q:"71. How does an embedded system communicate with the outside world?", opts:["Memory","Output","Peripherals","Input"], ans:2 },
  { q:"72. What is an embedded system?", opts:["A stand-alone computer system","A system that performs a variety of computing tasks","A dedicated system designed to perform a specific task","A system embedded into a network"], ans:2 },
  { q:"73. Which programming language is widely used in embedded system development?", opts:["Python","C","JavaScript","Ruby"], ans:1 },
  { q:"74. Which component is the heart of an embedded system?", opts:["RAM","Input Device","Microcontroller","Output Device"], ans:2 },
  { q:"75. Which of the following best describes the software in an embedded system?", opts:["General-purpose software","Operating System","Firmware","Utility software"], ans:2 },
  { q:"76. Which of the following is NOT a characteristic of embedded systems?", opts:["Real-time operation","Task-specific functionalities","High storage capacity","Optimized for power consumption"], ans:2 },
  { q:"77. Embedded systems usually have __________ boot-up times.", opts:["Long","Moderate","Short","Variable"], ans:2 },
  { q:"78. Embedded systems are generally _________.", opts:["Re-programmable","Non-reprogrammable","Often connected to the internet","Designed for multiple tasks"], ans:1 },
  { q:"79. In embedded systems, what does \"RTOS\" stand for?", opts:["Remote Transfer Operating System","Real-Time Operating Software","Real-Time Operating System","Rapid Transfer Operating System"], ans:2 },
  { q:"80. Which feature is essential for an RTOS?", opts:["Predictable response time","High storage capability","Multitasking capability","Internet connectivity"], ans:0 },
  { q:"81. Embedded systems are typically designed for:", opts:["Broad functionalities","User upgradability","Specific applications","General-purpose computing"], ans:2 },
  { q:"82. Which type of memory is typically used for permanent storage in embedded systems?", opts:["RAM","ROM","Cache","DDR"], ans:1 },
  { q:"83. In the context of embedded systems, what does \"DSP\" stand for?", opts:["Digital Signal Processor","Dedicated System Protocol","Device Specific Programming","Digital Systems Programming"], ans:0 },
  { q:"84. Which of the following is NOT a primary component of an embedded system?", opts:["Microcontroller","Input device","Graphics card","Output device"], ans:2 },
  { q:"85. An advantage of embedded systems over general-purpose systems is:", opts:["Higher processing power","Greater versatility","Lower cost","Better multitasking"], ans:2 },
  { q:"86. Which of the following best describes \"firmware\"?", opts:["Hardware components of an embedded system","Temporary software that is easy to modify","Software that provides UI for embedded systems","Software programmed directly onto hardware components"], ans:3 },
  { q:"87. The primary purpose of an RTOS in an embedded system is to:", opts:["Enhance the user interface","Manage tasks in real-time","Provide internet connectivity","Boost the system's processing power"], ans:1 },
  { q:"88. What kind of embedded system is used in washing machines and printers?", opts:["Standalone embedded systems","Mobile embedded systems","Networked embedded systems","Real-time embedded systems"], ans:0 },
  { q:"89. In the context of embedded systems, \"SoC\" stands for:", opts:["Software of Communication","System of Components","System on Chip","Software on Chip"], ans:2 },
  { q:"90. Which of the following is an example of a real-time embedded system?", opts:["Digital watch","Microwave oven","Airbag system in cars","MP3 player"], ans:2 },
  { q:"91. What is the primary storage type used for fast data access in embedded systems?", opts:["Hard Disk Drive","Flash Memory","CD-ROM","Magnetic Tape"], ans:1 },
  { q:"92. What is the primary role of a watchdog timer in an embedded system?", opts:["To boost performance","To reset the system if it hangs","To improve connectivity","To update the firmware"], ans:1 },
  { q:"93. Which of this best describes the difference between an embedded OS and desktop OS?", opts:["Embedded OS is more versatile","Desktop OS is used in mobile devices","Embedded OS is tailored for specific tasks","Desktop OS has limited functionality"], ans:2 },
  { q:"94. An embedded system's lifecycle is typically:", opts:["Shorter than that of general-purpose systems","Longer than that of general-purpose systems","Same as that of general-purpose systems","Unpredictable"], ans:1 },
  { q:"95. A common challenge in embedded system design is:", opts:["High power consumption","Resource constraints","Easy upgradability","High storage requirements"], ans:1 },
  { q:"96. Which one of the following offers CPUs as integrated memory or peripheral interfaces?", opts:["Microcontroller","Microprocessor","Embedded system","Memory system"], ans:0 },
  { q:"97. What is CISC?", opts:["Computing instruction set complex","Complex instruction set computing","Complementary instruction set computing","Complex instruction set complementary"], ans:1 },
  { q:"98. What is RISC?", opts:["Ratio instruction set complex","Reduced instruction set computing","Random instruction set computing","Rapidly instruction set complementary"], ans:1 },
  { q:"99. What does API stand for?", opts:["Address programming interface","Application programming interface","Accessing peripheral through interface","Address programming interface (2)"], ans:1 },
  { q:"100. Intel Pentium 4 (2004) has 3.0 GHZ clock speed and about 9000 MIPS. IPC equals:", opts:["1","2","3","4"], ans:2 },
  { q:"101. What does IPC stand for?", opts:["Internal Processer and Controller","Instructions per Cycle","Instructions per Clock","Instructions process in computer"], ans:1 },
  { q:"102. In little endian format:", opts:["LSB stored first (lowest address), MSB stored last (highest address).","LSB stored last (highest address), MSB stored first (lowest address).","LSB stored last (lowest address), MSB stored first (highest address).","LSB stored first (highest address), MSB stored last (lowest address)."], ans:0 },
  { q:"103. In big endian format:", opts:["LSB stored first (lowest address), MSB stored last (highest address).","LSB stored last (highest address), MSB stored first (lowest address).","LSB stored last (lowest address), MSB stored first (highest address).","LSB stored first (highest address), MSB stored last (lowest address)."], ans:1 },
  { q:"104. Level 1 of cache memory has:", opts:["Lowest speed","Highest speed","Biggest size","Smallest size"], ans:1 },
  { q:"105. What does CMOS stand for?", opts:["Complementary mix operating system","Complementary metal oxide semiconductor","Carry multiplex open system","Current mobile operating system"], ans:1 },
  { q:"106. When increasing clock speed of processor:", opts:["Instruction speed is reduced","Time of instruction process is no change","Power consumption of Chip is increased","Power consumption of Chip is decreased"], ans:2 },
  { q:"107. ARM is the name of:", opts:["Processor architecture","Memory architecture","Communication bus","Communication standard"], ans:0 },
  { q:"108. The memory which has a fixed content from manufacturer is:", opts:["RAM","EEPROM","MROM","Flash"], ans:2 },
  { q:"109. To control active-low LED, how does LED connect to micro controller (µC)?", opts:["Anode→pin of µC, Cathode→Vcc","Anode→pin of µC, Cathode→Ground","Cathode→pin of µC, Anode→Vcc","Cathode→pin of µC, Anode→Ground"], ans:2 },
  { q:"110. Translation flow from source code written in C programming to Assembly for embedded circuit is:", opts:["Pre-processor→Processor→Compiler→Loader","Processor→Compiler→Assembler→Linker/loader","Pre-processor→Compiler→Assembler→Linker/loader","Loader→Compiler→Assembler→Linker"], ans:2 },
  { q:"111. Optimization source code from C programming to Assembly is processed in:", opts:["Processor","Linker","Compiler","Assembler"], ans:2 },
  { q:"112. Which is not an embedded system:", opts:["Laptop","Washing machine controller","Light automotive controller","Arduino micro controller"], ans:0 },
  { q:"113. Which is not a feature of embedded system:", opts:["Specialization","Reliability","General purpose","Compact"], ans:2 },
  { q:"114. Embedded system can be applied to:", opts:["Medical and Industrial","Aviation and Military","Consumer and specialized electronics","All"], ans:3 },
  { q:"115. Which is the name of an embedded system (application classification)?", opts:["Data communication","Signal amplification","Harmonic oscillator","None"], ans:0 },
  { q:"116. Embedded system has:", opts:["Processor, memory, input data reader circuits, communication ports","Processor, memory card reader, I/O ports, communication ports","Processor, memory, I/O ports, communication ports","Processor, memory, I/O ports, USB"], ans:2 },
  { q:"117. In the embedded system, which layer is indispensable?", opts:["Application software","Hardware","System software","Middleware"], ans:1 },
  { q:"118. In the design of an embedded system, which does not model need specific plan?", opts:["Spiral","Waterfall","Code-and-fixed","Big-bang"], ans:3 },
  { q:"119. Which layer is very near to the user?", opts:["Application software","System software","Hardware","Depend on package design and IC position inside an embedded system"], ans:0 },
  { q:"120. The basic difference between Von Neumann and Harvard architecture is:", opts:["ALU structure","Register's structure","Bus and memory organization","All"], ans:2 },
];
 
const labels = ['A','B','C','D'];
let shuffleQ = true;
let shuffleA = true;
let currentQuestions = [];
 
function toggleShuffleQ() {
  shuffleQ = !shuffleQ;
  const btn = document.getElementById('tog-q');
  btn.textContent = '🔀 Tráo câu hỏi: ' + (shuffleQ ? 'BẬT' : 'TẮT');
  btn.classList.toggle('active', shuffleQ);
}
function toggleShuffleA() {
  shuffleA = !shuffleA;
  const btn = document.getElementById('tog-a');
  btn.textContent = '🔀 Tráo đáp án: ' + (shuffleA ? 'BẬT' : 'TẮT');
  btn.classList.toggle('active', shuffleA);
}
 
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
 
function prepareQuestions() {
  let qOrder = BANK.map((_, i) => i);
  if (shuffleQ) qOrder = shuffle(qOrder);
 
  currentQuestions = qOrder.map(origIdx => {
    const item = BANK[origIdx];
    const correctText = item.opts[item.ans];
    let optOrder = item.opts.map((_, j) => j);
    if (shuffleA) optOrder = shuffle(optOrder);
    const newOpts = optOrder.map(j => item.opts[j]);
    const newAns  = newOpts.indexOf(correctText);
    return { origIdx, q: item.q, opts: newOpts, ans: newAns };
  });
}
 
function buildQuiz() {
  prepareQuestions();
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  currentQuestions.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = 'card-' + i;
    const optHTML = item.opts.map((opt, j) => `
      <label id="lbl-${i}-${j}">
        <input type="radio" name="q${i}" value="${j}">
        <span><b>${labels[j]}.</b> ${opt}</span>
      </label>`).join('');
    card.innerHTML = `<div class="question-text">Câu ${i+1}. ${item.q.replace(/^\d+\.\s*/,'')}</div>
                      <div class="options">${optHTML}</div>`;
    container.appendChild(card);
  });
}
 
function submitQuiz() {
  let correct = 0;
  currentQuestions.forEach((item, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    for (let j = 0; j < item.opts.length; j++) {
      document.getElementById(`lbl-${i}-${j}`)
        .classList.remove('result-correct','result-wrong','result-answer');
    }
    const ansLbl = document.getElementById(`lbl-${i}-${item.ans}`);
    if (selected) {
      const chosen = parseInt(selected.value);
      if (chosen === item.ans) {
        document.getElementById(`lbl-${i}-${chosen}`).classList.add('result-correct');
        correct++;
      } else {
        document.getElementById(`lbl-${i}-${chosen}`).classList.add('result-wrong');
        ansLbl.classList.add('result-answer');
      }
    } else {
      ansLbl.classList.add('result-answer');
    }
    document.querySelectorAll(`input[name="q${i}"]`).forEach(r => r.disabled = true);
  });
  const box = document.getElementById('score-box');
  const pct = Math.round(correct / currentQuestions.length * 100);
  box.style.display = 'block';
  box.innerHTML = `🎯 Kết quả: ${correct}/${currentQuestions.length} câu đúng &nbsp;(${pct}%)`;
  box.scrollIntoView({behavior:'smooth'});
}
 
function shuffleAndRebuild() {
  document.getElementById('score-box').style.display = 'none';
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}
 
function resetQuiz() {
  document.getElementById('score-box').style.display = 'none';
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  currentQuestions.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = 'card-' + i;
    const optHTML = item.opts.map((opt, j) => `
      <label id="lbl-${i}-${j}">
        <input type="radio" name="q${i}" value="${j}">
        <span><b>${labels[j]}.</b> ${opt}</span>
      </label>`).join('');
    card.innerHTML = `<div class="question-text">Câu ${i+1}. ${item.q.replace(/^\d+\.\s*/,'')}</div>
                      <div class="options">${optHTML}</div>`;
    container.appendChild(card);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}
 
buildQuiz();
</script>
</body>
</html>
